name: Samples (passing)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  BC_ARTIFACT_VERSION: "27.5.46862.0"

jobs:
  test-samples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install AL compiler
        run: dotnet tool install --global microsoft.dynamics.businesscentral.development.tools.linux --version 16.2.28.57946

      - name: Download BC Service Tier DLLs (range request)
        run: |
          ARTIFACT_URL="https://bcartifacts-exdbf9fwegejdqak.b02.azurefd.net/onprem/${BC_ARTIFACT_VERSION}/platform"
          TARGET_DIR="artifacts/onprem/${BC_ARTIFACT_VERSION}/platform/ServiceTier/PFiles64/Microsoft Dynamics NAV/270/Service"
          mkdir -p "${TARGET_DIR}"

          TOTAL_SIZE=$(curl -sI "${ARTIFACT_URL}" | grep -i content-length | awk '{print $2}' | tr -d '\r')
          echo "Platform artifact size: ${TOTAL_SIZE} bytes"

          python3 .github/scripts/download-bc-dlls.py "${ARTIFACT_URL}" "${TOTAL_SIZE}" "${TARGET_DIR}"

      - name: Build
        run: dotnet build AlRunner/

      - name: Run all samples with coverage
        run: |
          EXIT=0

          # Write summary header
          echo "## Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | Sample | Tests | Coverage |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|--------|-------|----------|" >> "$GITHUB_STEP_SUMMARY"

          for sample in 01-pure-function 02-record-operations 03-interface-injection 04-asserterror 05-known-limitation; do
            echo "::group::Sample ${sample}"
            OUTPUT=$(dotnet run --no-build --project AlRunner -- --coverage "samples/${sample}/src" "samples/${sample}/test" 2>&1) || EXIT=1
            echo "$OUTPUT"
            echo "::endgroup::"

            # Extract results line
            RESULTS=$(echo "$OUTPUT" | grep "^Results:")
            PASSED=$(echo "$RESULTS" | grep -oP '\d+ passed' | grep -oP '\d+')
            FAILED=$(echo "$RESULTS" | grep -oP '\d+ failed' | grep -oP '\d+')

            # Extract coverage TOTAL line
            COVERAGE=$(echo "$OUTPUT" | grep "^  TOTAL" | grep -oP '\d+%' | head -1)
            COVERAGE=${COVERAGE:-"n/a"}

            if [ "${FAILED:-0}" = "0" ]; then
              echo "| :white_check_mark: | ${sample} | ${PASSED:-0} passed, ${FAILED:-0} failed | ${COVERAGE} |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| :x: | ${sample} | ${PASSED:-0} passed, ${FAILED:-0} failed | ${COVERAGE} |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          exit $EXIT
